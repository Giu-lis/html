<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="css/redefinir-senha.css">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap');

*{
    margin:0px;
    padding:0px;
}

body {
    background-image: url(uau.gif);
    background-repeat: no-repeat;
    background-size: cover;
}
.caixa {
    align-items: center;
    margin-right: 650px;
    margin-left: 650px;
    margin-top: 270px;
    padding: 10px 10px 10px 10px;
    border-radius: 5px;
    background-color: rgba(131, 179, 221, 0.813);

    box-shadow: 0 0 15px 5px rgba(0, 149, 255, 0.7);
}

h2 {
    color: rgb(5, 5, 5);
    text-align: center;
    font-family:"Monsieur La Doulaise", cursive;
    font-size: 50px;
    padding-top: 10px;
    font-weight: 520;
}

label {
display: block;
padding-top: 10px;
padding-bottom: 10px;
font-family:"Monsieur La Doulaise", cursive;
font-weight: 520;
padding-left: 20px;
font-size: 27px;
color: rgb(0, 0, 0);
}

input {
    display: block;
    border-radius: 5px;
    border: 2px solid rgb(208, 208, 208);
    padding: 5px;
    width: 550px;
    margin-left: 3%;
}

button{
    align-items: center;
    border-radius: 5px;
    background-color: rgb(255, 255, 255);
    color: rgb(0, 0, 0);
    border: none;
    font-family:"Monsieur La Doulaise", cursive;
    font-size: 27px;
    display: block; 
    margin: auto;
    padding-top: 5px;
    padding-bottom: 5px;
    margin-top: 20px;
}

.botao {
    margin-top: 40px;
    width: 400px;
    margin-bottom: 20px;
}

button:hover{
    transform: scale(1.01);
    transition: transform 0.3s ease-in-out;
    background-color: rgb(150, 155, 255);
    cursor: pointer;
}
</style>
</head>
<body>
    <div class="caixa">
        <h2>Nova Senha</h2>
        <p id="infoEmail"></p>

        <form id="redefinir">
            <div class="form-group">
                <label>Nova senha</label>
                <input type="password" id="novaSenha" required minlength="4">
            </div>
            <div class="form-group">
                <label>Confirmar senha</label>
                <input type="password" id="confirmarSenha" required>
            </div>
            <button type="submit">Atualizar senha</button>
        </form>
        <div id="mensagem"></div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const emailUsuario=urlParams.get('email');

        if (emailUsuario){
            document.getElementById('infoEmail').innerText= `Redefinindo para: ${emailUsuario}`;
        }else{
            alert("Email não identificado na URL!");
        }

        const form = document.getElementById('redefinir');
        const mensagem = document.getElementById('mensagem');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;

            if(novaSenha !== confirmarSenha){
                mensagem.innerHTML = '<span style="color:red;">As senhas não coincidem!</span>';
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/usuarios/redefinir-senha', {
                    method:'POST',
                    headers: {'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email:emailUsuario,
                        novaSenha: novaSenha
                    })
                });

                if(response.ok){
                    mensagem.innerHTML='<span style="color: green;">Senha alterada com sucesso! Redirecionando...</span>';
                    setTimeout(() => {
                        window.location.href='login.html';
                    }, 2000);
                } else {
                    throw new Error ();
                }
            } catch(err) {
                mensagem.innerHTML= '<span style="color:black;">Erro ao atualizar senha.</span>';
            }
        });
    </script>
</body>
</html>
