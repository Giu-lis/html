<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

<style>

    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap');
    
    .cormorant-garamond-uniquifier {
    font-family: "Cormorant Garamond", serif;
    font-optical-sizing: auto;
    font-weight: weight;
    font-style: normal;
    }


    body{
        background-image: url(HD-wallpaper-floral-grungy-shapes-grunge-graphics-abstract-pink-vector-floral.jpg);
        background-repeat: no-repeat;
        background-size: cover;
    }

    .caixona{
        background-color: rgb(255, 174, 243);
        margin-top: 35vh;
        width: 60vh;
        height: 30vh;
        margin-left: 70vh;
        align-items: center;
        border-radius: 10px;
    }
    label{
        display: block;
        text-align: center;
        font-size: 20px;
        font-family: "Cormorant Garamond", serif;
        line-height: 35px;
    }
    h2{
        text-align: center;
    }
    button{
        justify-content: center;
        font-size: 20px;
        font-family: "Cormorant Garamond", serif;
    }
    input{
        width: 550px;
        margin-left: 4px;
        border-radius: 5px;
        border-color:rgb(255, 255, 255) ;
    }
    .botao{
        justify-content: center;
        align-items: center;
        text-align: center;
        margin-left: 250px;
        margin-top: 40px;
        width: 80px;
        border-radius: 7px;
        background-color: rgb(185, 241, 153);
        border-color: rgb(166, 207, 142);
    }
    
    .aaaaa{
        
        margin-left: 180px;
        margin-top: 10px;
    }

    #modalRecuperacao{
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: rgba(4, 36, 54, 0.6);
    justify-content: center; align-items: center;
    }

    .modal-content {
    background: rgb(0, 0, 0); 
    border-radius: 5px;
    text-align: center;
    }

    .modal-content {
        width: 500px;
    }

</style>

</head>
<body>

    <div class="caixona">
        <form id="loginForm">

        <h2>Login</h2>

        
        <label>Email</label>
        <input type="text" id="email" required />
        

        
        <label>Senha</label>
        <input type="password" id="senha" required />
        
        
        <button class="botao" type="submit">Entrar</button>
        
        <div class="aaaaa">
            <a href="index.html">Não possui cadastro?Cadastrar</a>
        </div>
       
        </form>

        <div id="modalRecuperacao">
            <div class="modal-content">
                <h3>Recuperar Senha</h3>
                <p style="font-size: 15px; margin: 10px 0; margin-left: 20px; color:#c9c7c7; font-style: italic;">Enviaremos um link para o seu e-mail.</p>
                <div class="input-group">
                    <input type="email" id="emailRecuperar" placeholder="Seu e-mail cadastrado" style="width: 450px;">
                </div>
                <button onclick="enviarEmailRecuperacao()" class="carambolas">Enviar Link</button>
                <button onclick="fecharModal()" class="carambolas" style="background: #ccc; color: #333; margin-top: 5px;">Cancelar</button>
                <div id="statusRecuperacao" style="margin-top: 10px; font-size: 13px;"></div>
            </div>
        </div>

        <script src="login.js"></script>

        <div class="esqueci">
            <a href="#" class="forgot-link" onclick="abrirModal()">Esqueci minha senha</a>
        </div>


    </div>


    
</body>
</html>

<script>
    function abrirModal() {
        document.getElementById("modalRecuperacao").style.display = "flex";
    }

    function fecharModal() {
        document.getElementById("modalRecuperacao").style.display = "none";
        document.getElementById("statusRecuperacao").textContent = "";
    }

    function enviarEmailRecuperacao() {
        const email = document.getElementById("emailRecuperar").value;
        const status = document.getElementById("statusRecuperacao");

        if (!email) {
            status.style.color = "red";
            status.textContent = "Digite um e-mail válido.";
            return;
        }

        status.style.color = "blue";
        status.textContent = "Processando...";

        // Chama o endpoint de solicitação que envia o e-mail no Java
        fetch(`http://localhost:8080/usuarios/solicitar-recuperacao?email=${email}`, {
            method: "POST"
        })
        .then(response => {
            if (response.ok) {
                status.style.color = "green";
                status.textContent = "E-mail enviado! Verifique sua caixa.";
            } else {
                status.style.color = "red";
                status.textContent = "E-mail não encontrado.";
            }
        })
        .catch(() => {
            status.style.color = "red";
            status.textContent = "Erro ao conectar com o servidor.";
        });
    }
</script>
